<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <!-- Warm golden sky gradient -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="35%" stop-color="#E8C96A" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#D4A843" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FAF7F2" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial glow behind flower -->
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E8C96A" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#D4A843" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAF7F2" stop-opacity="0"/>
    </radialGradient>

    <!-- Earth gradient -->
    <linearGradient id="earth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="40%" stop-color="#6B5B45"/>
      <stop offset="100%" stop-color="#4A3C2E"/>
    </linearGradient>

    <!-- Petal gradient -->
    <radialGradient id="petalPurple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9B6FD0"/>
      <stop offset="60%" stop-color="#6B3FA0"/>
      <stop offset="100%" stop-color="#5A3488"/>
    </radialGradient>

    <!-- Inner petal light -->
    <radialGradient id="petalInner" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#B088D8"/>
      <stop offset="100%" stop-color="#7B52B0"/>
    </radialGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A8A4A"/>
      <stop offset="100%" stop-color="#3D6B30"/>
    </linearGradient>

    <!-- Stem gradient -->
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A7A3A"/>
      <stop offset="100%" stop-color="#3D6B30"/>
    </linearGradient>

    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blur for atmospheric light -->
    <filter id="atmosphericBlur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="crackTexture">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Background: warm ivory -->
  <rect width="600" height="500" fill="#FAF7F2" rx="12"/>

  <!-- Sky wash -->
  <rect width="600" height="340" fill="url(#sky)" rx="12"/>

  <!-- Atmospheric golden light behind the flower -->
  <ellipse cx="300" cy="260" rx="180" ry="160" fill="url(#warmGlow)" filter="url(#atmosphericBlur)"/>

  <!-- Subtle sun rays -->
  <g opacity="0.12">
    <line x1="300" y1="80" x2="140" y2="320" stroke="#D4A843" stroke-width="30" stroke-linecap="round"/>
    <line x1="300" y1="80" x2="460" y2="320" stroke="#D4A843" stroke-width="30" stroke-linecap="round"/>
    <line x1="300" y1="80" x2="220" y2="340" stroke="#D4A843" stroke-width="24" stroke-linecap="round"/>
    <line x1="300" y1="80" x2="380" y2="340" stroke="#D4A843" stroke-width="24" stroke-linecap="round"/>
    <line x1="300" y1="80" x2="300" y2="340" stroke="#D4A843" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- ===== CRACKED EARTH ===== -->
  <g>
    <!-- Main earth mass -->
    <path d="M0,370 C80,355 150,365 200,358 C250,350 280,360 330,355 C380,350 430,362 500,356 C550,360 580,355 600,365 L600,500 L0,500 Z" fill="url(#earth)"/>

    <!-- Earth surface highlights -->
    <path d="M0,370 C80,355 150,365 200,358 C250,350 280,360 330,355 C380,350 430,362 500,356 C550,360 580,355 600,365" fill="none" stroke="#9B8A72" stroke-width="2" opacity="0.5"/>

    <!-- Cracks in the earth -->
    <g stroke="#3A2E20" stroke-linecap="round" fill="none" opacity="0.6">
      <!-- Main crack (where flower emerges) -->
      <path d="M270,358 L275,380 L268,410 L280,445 L275,480" stroke-width="3"/>
      <path d="M330,355 L325,378 L332,408 L322,440 L328,480" stroke-width="3"/>
      <!-- Branching cracks left -->
      <path d="M275,380 L240,395 L220,385" stroke-width="2"/>
      <path d="M268,410 L230,425 L210,420" stroke-width="1.5"/>
      <path d="M240,395 L235,430" stroke-width="1.5"/>
      <!-- Branching cracks right -->
      <path d="M325,378 L360,390 L385,382" stroke-width="2"/>
      <path d="M332,408 L370,418 L395,412" stroke-width="1.5"/>
      <path d="M360,390 L365,425" stroke-width="1.5"/>
      <!-- Smaller cracks far left -->
      <path d="M80,375 L95,400 L85,430" stroke-width="1.5"/>
      <path d="M95,400 L120,410" stroke-width="1"/>
      <!-- Smaller cracks far right -->
      <path d="M500,370 L510,400 L500,435" stroke-width="1.5"/>
      <path d="M510,400 L535,395" stroke-width="1"/>
      <!-- Medium cracks -->
      <path d="M150,368 L160,395 L148,425" stroke-width="1.5"/>
      <path d="M440,365 L448,392 L438,420" stroke-width="1.5"/>
    </g>

    <!-- Dried earth texture patches -->
    <g fill="#7A6B55" opacity="0.15">
      <ellipse cx="120" cy="410" rx="40" ry="15"/>
      <ellipse cx="450" cy="405" rx="35" ry="12"/>
      <ellipse cx="300" cy="430" rx="25" ry="10"/>
    </g>

    <!-- Small pebbles/debris -->
    <g fill="#6B5B45" opacity="0.4">
      <circle cx="190" cy="375" r="3"/>
      <circle cx="410" cy="372" r="2.5"/>
      <circle cx="250" cy="368" r="2"/>
      <circle cx="355" cy="365" r="2"/>
      <circle cx="480" cy="378" r="2.5"/>
      <circle cx="100" cy="380" r="2"/>
    </g>
  </g>

  <!-- ===== FLOWER AND STEM ===== -->
  <g filter="url(#softShadow)">
    <!-- Stem -->
    <path d="M300,350 C298,320 302,290 298,260 C296,245 300,230 300,215" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Small stem texture lines -->
    <path d="M298,330 L300,325" stroke="#3D6B30" stroke-width="1" opacity="0.4"/>
    <path d="M301,300 L299,295" stroke="#3D6B30" stroke-width="1" opacity="0.4"/>

    <!-- Left leaf -->
    <path d="M298,290 C280,278 255,282 245,275 C255,270 278,268 298,282" fill="url(#leaf)"/>
    <path d="M298,286 C282,276 260,278 250,274" stroke="#4A7A3A" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Right leaf (smaller, higher) -->
    <path d="M300,265 C315,255 332,258 340,252 C332,248 318,248 302,258" fill="url(#leaf)"/>
    <path d="M301,261 C314,254 328,256 336,251" stroke="#4A7A3A" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- ===== FLOWER HEAD ===== -->
    <g transform="translate(300, 195)">
      <!-- Back petals (darker, behind) -->
      <ellipse cx="-22" cy="-18" rx="28" ry="14" transform="rotate(-30)" fill="#5A3488" opacity="0.8"/>
      <ellipse cx="22" cy="-18" rx="28" ry="14" transform="rotate(30)" fill="#5A3488" opacity="0.8"/>
      <ellipse cx="0" cy="-30" rx="14" ry="28" fill="#5A3488" opacity="0.8"/>

      <!-- Main petals -->
      <ellipse cx="-28" cy="-5" rx="30" ry="14" transform="rotate(-50)" fill="url(#petalPurple)"/>
      <ellipse cx="28" cy="-5" rx="30" ry="14" transform="rotate(50)" fill="url(#petalPurple)"/>
      <ellipse cx="-15" cy="-22" rx="28" ry="13" transform="rotate(-15)" fill="url(#petalInner)"/>
      <ellipse cx="15" cy="-22" rx="28" ry="13" transform="rotate(15)" fill="url(#petalInner)"/>
      <ellipse cx="0" cy="-28" rx="13" ry="26" fill="url(#petalInner)"/>

      <!-- Petal vein details -->
      <g stroke="#9B6FD0" stroke-width="0.5" fill="none" opacity="0.3">
        <path d="M0,-2 L-20,-30"/>
        <path d="M0,-2 L20,-30"/>
        <path d="M0,-2 L-32,-15"/>
        <path d="M0,-2 L32,-15"/>
        <path d="M0,-2 L0,-38"/>
      </g>

      <!-- Flower center -->
      <circle cx="0" cy="-2" r="10" fill="#D4A843"/>
      <circle cx="0" cy="-2" r="7" fill="#E8C96A"/>
      <!-- Center texture dots -->
      <g fill="#D4A843" opacity="0.6">
        <circle cx="-3" cy="-4" r="1.2"/>
        <circle cx="3" cy="-4" r="1.2"/>
        <circle cx="0" cy="1" r="1.2"/>
        <circle cx="-2" cy="-1" r="1"/>
        <circle cx="2" cy="-1" r="1"/>
      </g>
    </g>
  </g>

  <!-- ===== TINY SPROUTS (signs of life near the cracks) ===== -->
  <g opacity="0.6">
    <!-- Small sprout left -->
    <path d="M220,360 C218,350 222,345 220,338" stroke="#5A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M220,342 C214,338 210,340 208,336 C212,334 216,335 220,340" fill="#5A8A4A"/>

    <!-- Small sprout right -->
    <path d="M380,358 C382,350 378,344 380,337" stroke="#5A8A4A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M380,341 C386,337 390,339 392,335 C388,333 384,334 380,339" fill="#5A8A4A"/>

    <!-- Tiny grass blade -->
    <path d="M170,366 C168,358 172,352 170,346" stroke="#5A8A4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M430,363 C432,356 428,350 430,344" stroke="#5A8A4A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== FLOATING LIGHT PARTICLES ===== -->
  <g fill="#D4A843">
    <circle cx="200" cy="180" r="2.5" opacity="0.3"/>
    <circle cx="400" cy="160" r="2" opacity="0.25"/>
    <circle cx="160" cy="240" r="1.8" opacity="0.2"/>
    <circle cx="440" cy="220" r="2.2" opacity="0.2"/>
    <circle cx="250" cy="140" r="1.5" opacity="0.3"/>
    <circle cx="350" cy="130" r="1.8" opacity="0.25"/>
    <circle cx="180" cy="300" r="1.5" opacity="0.15"/>
    <circle cx="420" cy="290" r="1.5" opacity="0.15"/>
    <circle cx="330" cy="110" r="2" opacity="0.2"/>
    <circle cx="230" cy="200" r="1.2" opacity="0.2"/>
    <circle cx="370" cy="195" r="1.2" opacity="0.2"/>
  </g>
</svg>